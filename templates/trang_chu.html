<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MangaVerse - Thư viện truyện tranh</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #0f172a;
            scroll-behavior: smooth;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(2px);
            border-bottom: 1px solid #eef2f6;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d44c2f, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo i {
            background: none;
            color: #e67e22;
            font-size: 1.8rem;
        }
        .search-wrapper {
            flex: 1;
            max-width: 460px;
            margin: 0 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 8px 18px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .search-box:focus-within {
            background: white;
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
        }
        .search-box i {
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 12px;
            width: 100%;
            font-size: 0.95rem;
            outline: none;
            font-weight: 500;
        }
        .avatar-dropdown {
            position: relative;
            cursor: pointer;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #e67e22, #d44c2f);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: 54px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15);
            width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            z-index: 200;
            border: 1px solid #f0eae4;
        }
        .avatar-dropdown.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #1e293b;
            text-decoration: none;
            font-weight: 500;
            transition: 0.1s;
            border-radius: 16px;
            margin: 4px 8px;
        }
        .dropdown-menu a:hover {
            background: #fef3e8;
            color: #e67e22;
        }
        .dropdown-menu hr {
            margin: 6px 12px;
            border-color: #f0eae4;
        }

        /* container chính */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 24px 40px;
        }

        /* Hero slider / hot manga */
        .hero-section {
            margin-bottom: 48px;
        }
        .hero-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hero-title i {
            color: #e67e22;
            font-size: 1.8rem;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
        }
        .hero-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.25s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #f1e9e2;
            cursor: pointer;
        }
        .hero-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 28px -12px rgba(0,0,0,0.15);
        }
        .hero-img {
            height: 200px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .hero-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #e67e22;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
        }
        .hero-info {
            padding: 18px;
        }
        .hero-info h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
        }
        .hero-info p {
            color: #475569;
            font-size: 0.85rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .read-now {
            background: #fff3e8;
            border: none;
            padding: 8px 0;
            margin-top: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: #e67e22;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .read-now:hover {
            background: #e67e22;
            color: white;
        }

        /* danh sách truyện + grid */
        .manga-section {
            margin: 48px 0 40px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .section-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            border-left: 6px solid #e67e22;
            padding-left: 18px;
        }
        .grid-manga {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 28px;
        }
        /* card truyện */
        .manga-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.03);
            border: 1px solid #f0eae4;
            display: flex;
            flex-direction: column;
        }
        .manga-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px -12px rgba(0,0,0,0.12);
        }
        .card-cover {
            height: 220px;
            background-size: cover;
            background-position: center;
            background-color: #ede9e3;
        }
        .card-body {
            padding: 16px 16px 20px;
        }
        .card-body h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .desc {
            font-size: 0.8rem;
            color: #5b6e8c;
            margin-bottom: 16px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .btn-read {
            background: white;
            border: 1.5px solid #f1d5bf;
            padding: 8px 0;
            border-radius: 40px;
            font-weight: 600;
            color: #e67e22;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-read:hover {
            background: #e67e22;
            border-color: #e67e22;
            color: white;
        }

        /* phân trang */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 56px 0 20px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #1f2a44;
        }
        .page-btn.active {
            background: #e67e22;
            border-color: #e67e22;
            color: white;
        }
        .page-btn:hover:not(.active) {
            background: #fef3e8;
            border-color: #e67e22;
        }

        /* popup lỗi */
        .error-popup {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #1e293b;
            backdrop-filter: blur(12px);
            color: #facc15;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
            font-size: 0.9rem;
            border-left: 5px solid #f97316;
        }
        .error-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }
        .error-popup i {
            font-size: 1.3rem;
            color: #f97316;
        }

        /* responsive */
        @media (max-width: 1100px) {
            .grid-manga {
                grid-template-columns: repeat(3, 1fr);
                gap: 22px;
            }
        }
        @media (max-width: 780px) {
            .grid-manga {
                grid-template-columns: repeat(2, 1fr);
            }
            .hero-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .nav-container {
                flex-wrap: wrap;
            }
            .search-wrapper {
                order: 3;
                max-width: 100%;
                margin: 8px 0 0;
                width: 100%;
            }
            .section-header h2 {
                font-size: 1.5rem;
            }
        }
        @media (max-width: 540px) {
            .grid-manga {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .card-cover {
                height: 170px;
            }
        }
        footer {
            text-align: center;
            padding: 32px 0 24px;
            border-top: 1px solid #eef2f6;
            margin-top: 32px;
            color: #5b6e8c;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-book-open"></i>
            <span>MangaVerse</span>
        </div>
        <div class="search-wrapper">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm truyện theo tên, tác giả...">
            </div>
        </div>
        <div class="avatar-dropdown" id="avatarDropdown">
            <div class="avatar">
                <i class="fas fa-user-astronaut"></i>
            </div>
            <div class="dropdown-menu">
                <a href="#"><i class="fas fa-user-circle"></i> Hồ sơ cá nhân</a>
                <a href="#"><i class="fas fa-chart-line"></i> Quản lý theo dõi</a>
                <a href="#"><i class="fas fa-cog"></i> Cài đặt</a>
                <hr>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
            </div>
        </div>
    </div>
</div>

<main class="container">
    <!-- Hero: bộ truyện hot -->
    <div class="hero-section">
        <div class="hero-title">
            <i class="fas fa-fire-flame-curved"></i>
            <span>🔥 Truyện HOT nhất tuần</span>
        </div>
        <div class="hero-grid" id="heroGrid"></div>
    </div>

    <!-- Grid danh sách truyện chính -->
    <div class="manga-section">
        <div class="section-header">
            <h2><i class="fas fa-compass"></i> Khám phá truyện hay</h2>
            <span style="font-size:0.85rem; background:#fff0e6; padding:4px 12px; border-radius:40px;">✨ 4 truyện/hàng (PC) - 2 truyện/hàng (Mobile)</span>
        </div>
        <div class="grid-manga" id="mangaGrid"></div>
    </div>

    <!-- Phân trang -->
    <div class="pagination" id="paginationControls"></div>
</main>

<footer>
    <p>© 2025 MangaVerse - Đọc truyện miễn phí, cập nhật liên tục</p>
</footer>

<!-- Popup báo lỗi -->
<div id="errorPopup" class="error-popup">
    <i class="fas fa-triangle-exclamation"></i>
    <span id="errorMessage">⚠️ Đã có lỗi xảy ra, vui lòng thử lại sau!</span>
</div>

<script>
    // ---------- Dữ liệu truyện mẫu ----------
    const allStories = [
        { id: 1, title: "Thanh Xuân Của Tôi", cover: "https://picsum.photos/id/20/400/300", desc: "Câu chuyện học đường cảm động về tình bạn và tình yêu.", hot: true, category: "romance" },
        { id: 2, title: "Sát Thủ Vĩ Đại", cover: "https://picsum.photos/id/104/400/300", desc: "Hành trình của sát thủ huyền thoại với những pha hành động gay cấn.", hot: true, category: "action" },
        { id: 3, title: "Chuyện Ma Làng Xa", cover: "https://picsum.photos/id/29/400/300", desc: "Yếu tố kinh dị, rùng rợn và bí ẩn từ ngôi làng cổ.", hot: true, category: "horror" },
        { id: 4, title: "Vua Hải Tặc", cover: "https://picsum.photos/id/100/400/300", desc: "Đại hải trình tìm kho báu huyền thoại One Piece.", hot: false, category: "adventure" },
        { id: 5, title: "Tiên Kiếm Kỳ Hiệp", cover: "https://picsum.photos/id/22/400/300", desc: "Tu tiên, kiếm đạo và tình yêu ngàn năm.", hot: true, category: "xianxia" },
        { id: 6, title: "Khu Vườn Ngôn Tình", cover: "https://picsum.photos/id/26/400/300", desc: "Những rung động đầu đời, ngọt ngào và đáng nhớ.", hot: false, category: "romance" },
        { id: 7, title: "Thợ Săn Quỷ", cover: "https://picsum.photos/id/38/400/300", desc: "Cuộc chiến chống lại thế lực hắc ám đe dọa nhân loại.", hot: false, category: "action" },
        { id: 8, title: "Kỹ Năng Siêu Phàm", cover: "https://picsum.photos/id/48/400/300", desc: "Game thủ xuyên không và hành trình chinh phục vương quốc.", hot: false, category: "fantasy" },
        { id: 9, title: "Cô Dâu Bất Đắc Dĩ", cover: "https://picsum.photos/id/65/400/300", desc: "Hợp đồng hôn nhân và những tình huống dở khóc dở cười.", hot: false, category: "romance" },
        { id: 10, title: "Đấu La Đại Lục", cover: "https://picsum.photos/id/91/400/300", desc: "Huyền thoại về vương miện và linh hồn võ hồn.", hot: true, category: "fantasy" },
        { id: 11, title: "One Punch God", cover: "https://picsum.photos/id/96/400/300", desc: "Hài hước, siêu anh hùng một đấm diệt quái.", hot: false, category: "action" },
        { id: 12, title: "Lớp Học Bí Mật", cover: "https://picsum.photos/id/77/400/300", desc: "Trường học với những bí mật động trời.", hot: false, category: "mystery" }
    ];

    // Lấy 4 truyện hot cho hero
    const hotStories = allStories.filter(s => s.hot === true).slice(0, 4);

    // State phân trang
    let currentPage = 1;
    const itemsPerPage = 8;  // 4x2 => 8 items mỗi trang (2 hàng desktop)
    
    // hàm render hero (hot)
    function renderHero() {
        const heroGrid = document.getElementById('heroGrid');
        if (!heroGrid) return;
        heroGrid.innerHTML = hotStories.map(story => `
            <div class="hero-card" data-id="${story.id}">
                <div class="hero-img" style="background-image: url('${story.cover}'); background-size: cover;">
                    <span class="hero-badge"><i class="fas fa-fire"></i> HOT</span>
                </div>
                <div class="hero-info">
                    <h3>${story.title}</h3>
                    <p>${story.desc.substring(0, 70)}...</p>
                    <button class="read-now" data-id="${story.id}">📖 Đọc ngay</button>
                </div>
            </div>
        `).join('');
        // gắn sự kiện cho các nút đọc hero
        document.querySelectorAll('.hero-card .read-now').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                showReadNowPopup(id);
            });
        });
        document.querySelectorAll('.hero-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = card.getAttribute('data-id');
                if(id) showReadNowPopup(id);
            });
        });
    }

    // Hàm hiển thị popup lỗi (táy máy cảnh báo)
    function showErrorPopup(message) {
        const popup = document.getElementById('errorPopup');
        const msgSpan = document.getElementById('errorMessage');
        if (popup && msgSpan) {
            msgSpan.innerHTML = `<i class="fas fa-ban"></i> ${message}`;
            popup.classList.add('show');
            setTimeout(() => {
                popup.classList.remove('show');
            }, 2500);
        }
    }

    // Xử lý "đọc ngay" -> báo lỗi vì chưa đăng nhập / chức năng demo
    function showReadNowPopup(storyId) {
        const story = allStories.find(s => s.id == storyId);
        const name = story ? story.title : "truyện này";
        // Đây là hành vi "táy máy" -> báo lỗi giả lập: chưa đăng nhập hoặc thiếu quyền truy cập
        showErrorPopup(`⚠️ Bạn cần đăng nhập để đọc "${name}". Vui lòng đăng nhập!`);
    }

    // Render grid chính theo page
    function renderMangaGrid() {
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const paginatedItems = allStories.slice(startIndex, endIndex);
        const grid = document.getElementById('mangaGrid');
        if (!grid) return;
        if (paginatedItems.length === 0 && currentPage > 1) {
            // fallback về trang 1 nếu không có dữ liệu
            currentPage = 1;
            renderMangaGrid();
            renderPagination();
            return;
        }
        grid.innerHTML = paginatedItems.map(story => `
            <div class="manga-card" data-id="${story.id}">
                <div class="card-cover" style="background-image: url('${story.cover}'); background-size: cover;"></div>
                <div class="card-body">
                    <h3>${story.title}</h3>
                    <div class="desc">${story.desc.length > 80 ? story.desc.substring(0, 80) + '...' : story.desc}</div>
                    <button class="btn-read" data-id="${story.id}">📚 Đọc ngay</button>
                </div>
            </div>
        `).join('');

        // Gắn sự kiện đọc ngay cho các nút trong grid
        document.querySelectorAll('.btn-read').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if(id) showReadNowPopup(id);
            });
        });
        // Cho phép click vào card cũng báo lỗi (táy máy)
        document.querySelectorAll('.manga-card').forEach(card => {
            card.addEventListener('click', (e) => {
                // Tránh bị trùng nếu click vào nút
                if(e.target.classList.contains('btn-read')) return;
                const id = card.getAttribute('data-id');
                if(id) showReadNowPopup(id);
            });
        });
    }

    // Phân trang controls
    function renderPagination() {
        const totalPages = Math.ceil(allStories.length / itemsPerPage);
        const paginationDiv = document.getElementById('paginationControls');
        if (!paginationDiv) return;
        if (totalPages <= 1) {
            paginationDiv.innerHTML = '';
            return;
        }
        let html = '';
        // nút prev
        html += `<button class="page-btn" id="prevPageBtn" ${currentPage === 1 ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>‹ Trước</button>`;
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        html += `<button class="page-btn" id="nextPageBtn" ${currentPage === totalPages ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>Sau ›</button>`;
        paginationDiv.innerHTML = html;

        // Gắn sự kiện cho các nút số trang
        document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const page = parseInt(btn.getAttribute('data-page'));
                if (!isNaN(page) && page !== currentPage) {
                    currentPage = page;
                    renderMangaGrid();
                    renderPagination();
                    window.scrollTo({ top: 500, behavior: 'smooth' });
                }
            });
        });
        const prevBtn = document.getElementById('prevPageBtn');
        if (prevBtn && currentPage > 1) {
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderMangaGrid();
                    renderPagination();
                    window.scrollTo({ top: 500, behavior: 'smooth' });
                } else {
                    showErrorPopup("Bạn đang ở trang đầu tiên rồi!");
                }
            });
        } else if (prevBtn && currentPage === 1) {
            prevBtn.addEventListener('click', () => showErrorPopup("🚫 Không thể lùi, đây là trang đầu tiên!"));
        }
        const nextBtn = document.getElementById('nextPageBtn');
        if (nextBtn && currentPage < totalPages) {
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderMangaGrid();
                    renderPagination();
                    window.scrollTo({ top: 500, behavior: 'smooth' });
                } else {
                    showErrorPopup("Bạn đã ở trang cuối cùng rồi!");
                }
            });
        } else if (nextBtn && currentPage === totalPages) {
            nextBtn.addEventListener('click', () => showErrorPopup("📄 Đã hết dữ liệu! Không có trang tiếp theo."));
        }
    }

    // chức năng tìm kiếm với popup lỗi "táy máy" (demo)
    function setupSearch() {
        const searchInput = document.getElementById('searchInput');
        if (!searchInput) return;
        let debounceTimer;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const keyword = e.target.value.trim().toLowerCase();
            debounceTimer = setTimeout(() => {
                if (keyword === "") {
                    // reset về full list
                    window.location.reload(); // đơn giản tải lại, nhưng giữ trải nghiệm
                    showErrorPopup("🔍 Tìm kiếm trống, hiển thị lại toàn bộ truyện");
                    return;
                }
                // Tìm kiếm nhưng sẽ hiển thị popup lỗi vì chức năng "chưa hoàn thiện" (táy máy demo)
                const filtered = allStories.filter(s => s.title.toLowerCase().includes(keyword) || s.desc.toLowerCase().includes(keyword));
                if (filtered.length === 0) {
                    showErrorPopup(`😭 Không tìm thấy truyện nào khớp với "${keyword}". Thử từ khóa khác!`);
                } else {
                    showErrorPopup(`✨ Tìm thấy ${filtered.length} truyện, nhưng tính năng tìm kiếm nâng cao đang bảo trì. Vui lòng thử lại sau! (demo lỗi)`);
                }
                // Không cập nhật grid vì đây là lỗi giả lập "táy máy"
            }, 400);
        });
    }

    // avatar dropdown toggle + báo lỗi khi logout hoặc click linh tinh
    function setupAvatar() {
        const avatarDiv = document.getElementById('avatarDropdown');
        if (!avatarDiv) return;
        avatarDiv.addEventListener('click', (e) => {
            e.stopPropagation();
            avatarDiv.classList.toggle('active');
        });
        document.addEventListener('click', () => {
            avatarDiv.classList.remove('active');
        });
        const logoutItem = document.getElementById('logoutBtn');
        if (logoutItem) {
            logoutItem.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                showErrorPopup("🚪 Bạn đã đăng xuất (demo). Hãy đăng nhập lại để tiếp tục đọc truyện.");
                avatarDiv.classList.remove('active');
            });
        }
        // Thêm báo lỗi với các mục quản lý nếu click -> báo lỗi táy máy
        const manageLinks = document.querySelectorAll('.dropdown-menu a:not(#logoutBtn)');
        manageLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                showErrorPopup("⛔ Tính năng đang phát triển. Vui lòng quay lại sau!");
                avatarDiv.classList.remove('active');
            });
        });
    }

    // Nếu có bất kì thao tác "táy máy" bổ sung: click hero, nút đọc, tất cả đều gọi popup lỗi (có sẵn)
    function extraTroublesome() {
        // Bắt lỗi toàn trang click "đọc ngay" đã cover, ta thêm nếu click vào phân trang bất hợp lệ cũng báo lỗi (đã xử lý)
        // thêm sự kiện global để bắt bất kỳ hành vi giả lỗi
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('.page-btn') && e.target.closest('.page-btn').hasAttribute('disabled')) {
                // disable button đã được xử lý bằng message riêng, không làm gì thêm
            }
        });
    }

    function init() {
        renderHero();
        renderMangaGrid();
        renderPagination();
        setupSearch();
        setupAvatar();
        extraTroublesome();
    }
    init();
</script>
